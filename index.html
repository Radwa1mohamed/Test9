<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Mouse Effect</title>


  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="shortcut icon" href="/imgs/photo_2026-04-12_19-56-03.jpg" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    /* Colors */
    :root {
      --dark: #0F3345;
      --blue: #62BEAC;
      --soft-pink: #D9C1D7;
      --accent-pink: #E056A0;
      --greenish: #28474F;
      --primary-blue: #62BEAC;
      --dark-blue: #0b1f2a;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
    }

    body {
      background:
        radial-gradient(at 0% 0%, rgba(15, 51, 69, 0.2), transparent 50%),
        radial-gradient(at 100% 100%, rgba(98, 190, 172, 0.2), transparent 50%),
        linear-gradient(180deg, #0F3345 0%, #62BEAC 100%);
      color: white;
      min-height: 100vh;
      background-attachment: fixed;
    }

    #fire-glow {
      position: fixed;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(224, 86, 160, 0.25) 0%, rgba(224, 86, 160, 0) 70%);
      filter: blur(60px);
      pointer-events: none;
      z-index: -1;
      mix-blend-mode: screen;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 1100px;
      padding: 12px 20px;
      border-radius: 15px;
      background: rgba(15, 51, 69, 0.85);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 1000;
      transition: 0.3s ease;
    }

    .navbar.scrolled {
      background: rgba(15, 51, 69, 0.95);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .nav-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
    }

    .nav-links {
      display: flex;
      gap: 25px;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      position: relative;
      transition: 0.3s;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      background: #E056A0;
      left: 0;
      bottom: -5px;
      transition: 0.3s;
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      width: 100%;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: white;
    }

    /* زرار الموبايل */
    .menu-toggle {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: white;
    }


    .btn {
      padding: 12px 22px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .primary {
      background: var(--accent-pink);
      color: #fff;
    }

    .primary:hover {
      transform: scale(1.05);
    }

    .navbar:hover {
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
    }

    .nav-btn {
      margin-left: 30px;
      padding: 10px 20px;
      font-size: 14px;

      background: linear-gradient(45deg, #E056A0, #ff85c0);
      box-shadow: 0 5px 15px rgba(224, 86, 160, 0.4);
    }

    /* Responsive */
    @media (max-width: 768px) {
        nav {
        padding: 5px 5px;
    }

  
      .nav-links {
        position: absolute;
        top: 75px;
        right: -100%;
        background: rgba(15, 51, 69, 0.98);
        flex-direction: column;
        width: 250px;
        padding: 30px;
        border-radius: 20px;
        transition: 0.4s ease-in-out;
      }
       .navbar:hover {
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
        }

      .nav-links.active {
        right: 0;
      }

      .menu-toggle {
        display: block;
      }

      .btn {
        margin-right: 30px;
      }
    }

     /* Hero Section */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      padding: 0 8%;
      position: relative;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: 1s ease;
      transform: scale(1.05);
    }

    .bg1 {
      background-image: url("/photo_2026-04-12_19-56-03.jpg");
      z-index: 1;
    }

    .bg2 {
      background-image: url("/photo_2026-04-12_19-56-21.jpg");
      z-index: 0;
      opacity: 0;
    }

    .hero.active .bg1 {
      opacity: 0;
    }

    .hero.active .bg2 {
      opacity: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 2;
    }

    .text {
      position: relative;
      z-index: 3;
      color: #fff;
      max-width: 650px;
    }

    h1 {
      font-size: 56px;
      line-height: 1.2;
    }

    h1 span {
      color: var(--accent-pink);
    }

    #typing {
      margin-top: 15px;
      font-size: 18px;
      opacity: 0.85;
      min-height: 40px;
    }

    .buttons {
      margin-top: 25px;
      display: flex;
      gap: 15px;
    }

    .btn {
      padding: 12px 22px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .primary {
      background: var(--accent-pink);
      color: #fff;
    }

    .secondary {
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
    }

    .primary:hover {
      transform: scale(1.05);
    }

    .secondary:hover {
      background: #fff;
      color: #000;
    }
  </style>

</head>

<body>

  <div id="fire-glow"></div>

  <header class="navbar" id="navbar">
    <div class="nav-container">
      <div class="logo">Habiba Sayed</div>
      <nav class="nav-links" id="nav-links">
        <a href="#" class="active">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#">Work</a>
        <a href="#">Contact</a>
      </nav>
      <a href="#" class="btn primary nav-btn">Book Session</a>
      <div class="menu-toggle" id="menu-toggle">☰</div>
    </div>
  </header>

  <section class="hero" id="hero">

  <div class="bg bg1"></div>
  <div class="bg bg2"></div>

  <div class="overlay"></div>

  <div class="text">
    <h1>
      I don’t just write content…<br>
      I make people <span>feel & act</span>.
    </h1>

    <div id="typing"></div>

    <div class="buttons">
      <button class="btn primary">View My Work</button>
      <button class="btn secondary">Book a Session</button>
    </div>
  </div>

</section>



  <script>
    const navbar = document.getElementById("navbar");
    const toggle = document.getElementById("menu-toggle");
    const navLinks = document.getElementById("nav-links");
    const navItems = document.querySelectorAll(".nav-links a");

    // تغيير شكل الناف عند الاسكرول
    window.addEventListener("scroll", () => {
      navbar.classList.toggle("scrolled", window.scrollY > 50);
    });

    // فتح / قفل المينيو
    toggle.addEventListener("click", () => {
      navLinks.classList.toggle("active");
    });

    // قفل المينيو لما تضغط على لينك
    navItems.forEach(item => {
      item.addEventListener("click", () => {
        navLinks.classList.remove("active");
      });
    });

    const hero = document.getElementById("hero");

let canToggle = true;

document.addEventListener("mousemove", () => {
  if (!canToggle) return;

  hero.classList.toggle("active");

  canToggle = false;

  setTimeout(() => {
    canToggle = true;
  }, 300); // كل 200ms تغيير صورة
});
  </script>


</body>


</html>
