<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        .social-proof-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 40px 0;
    text-align: center;
}

/* حركة تداخل الصور */
.avatars-stack {
    display: flex;
    align-items: center;
    direction: ltr; /* عشان التداخل يبدأ من الشمال لليمين صح */
    margin-bottom: 15px;
}

.avatars-stack img, .more-clients {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: 3px solid #0F3345; /* نفس لون الخلفية عشان يبان القطع */
    margin-left: -15px; /* السحر كله هنا: الرقم السالب بيخلي الصور تتداخل */
    object-fit: cover;
    transition: transform 0.3s ease;
}

/* أول صورة مش محتاجة هامش سالب */
.avatars-stack img:first-child {
    margin-left: 0;
}

/* حركة بسيطة لما الماوس ييجي عليهم */
.avatars-stack img:hover {
    transform: translateY(-5px);
    z-index: 10;
}

.more-clients {
    background: var(--accent-pink);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    z-index: 1;
}

/* تنسيق النجوم والكلام */
.proof-text .stars {
    color: #FFD700; /* لون ذهبي للنجوم */
    font-size: 14px;
    margin-bottom: 5px;
}

.proof-text p {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
    font-weight: 300;
}
    </Style>
</head>

</body>
</html>
