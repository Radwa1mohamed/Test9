    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #081b25;
            --bg-light: #102c3b;
            --primary: #62BEAC;
            --secondary: #E056A0;
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, rgba(224, 86, 160, 0.12), transparent 30%),
                        radial-gradient(circle at bottom left, rgba(98, 190, 172, 0.12), transparent 30%),
                        linear-gradient(180deg, var(--bg-light) 0%, var(--bg-dark) 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header Section */
        .feedback-page-header {
            padding: 120px 20px 60px;
            text-align: center;
            position: relative;
        }

        .feedback-page-header h2 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--text);
        }

        .feedback-page-header p {
            color: var(--muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: auto;
        }

        .back-home {
            position: absolute;
            top: 40px;
            right: 5%;
            padding: 10px 22px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .back-home:hover {
            background: var(--primary);
            color: var(--bg-dark);
            transform: translateX(-5px);
        }

        /* Square Grid Layout */
        .feedback-full-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 5% 100px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Square Card Style */
        .screenshot-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid var(--border);
            backdrop-filter: blur(14px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
        }

        .screenshot-card:hover {
            transform: translateY(-10px);
            border-color: var(--secondary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .img-wrapper {
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1 / 1;
            background: rgba(0,0,0,0.2);
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: transform 0.6s ease;
        }

        .screenshot-card:hover img {
            transform: scale(1.1);
        }

        /* Hover Overlay */
        .hover-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 27, 37, 0.4);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .screenshot-card:hover .hover-overlay {
            opacity: 1;
        }

        .hover-overlay i {
            color: white;
            font-size: 1.2rem;
            background: var(--secondary);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Fullscreen Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 27, 37, 0.98);
            backdrop-filter: blur(15px);
            padding: 20px;
            cursor: zoom-out;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 95%;
            max-height: 85vh;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            animation: zoomEffect 0.3s ease;
            border: 2px solid var(--border);
        }

        @keyframes zoomEffect {
            from {transform: scale(0.8); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }

        .close-modal {
            position: absolute;
            top: 25px; left: 25px;
            color: var(--primary);
            font-size: 40px;
            cursor: pointer;
            z-index: 1001;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .feedback-page-header { padding-top: 100px; }
            .back-home { top: 20px; right: 20px; padding: 8px 15px; font-size: 0.85rem; }
            .feedback-full-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding-bottom: 60px; }
        }

        .footer-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 40px;
            border-radius: 60px;
            background: linear-gradient(45deg, var(--secondary), #ff82c0);
            color: white;
            font-weight: 800;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(224, 86, 160, 0.2);
        }

        .footer-back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(224, 86, 160, 0.4);
            color: white;
        }

        .footer-back-btn i {
            font-size: 1.1rem;
        }
    </style>
</head>

    <script>
        function openModal(src) {
            const modal = document.getElementById('imageModal');
            const fullImg = document.getElementById('imgFull');
            fullImg.src = src;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
            document.body.style.overflow = 'auto'; 
        }
        
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeModal();
            }
        });
    </script>
